<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kit de Finanzas para Fotógrafas — Karla Sotelo</title>
<meta name="description" content="La app que te dice exactamente cuánto cobrar por sesión y a dónde va tu dinero. Acceso de por vida.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f0e8;
  --bg2:#ede6d8;
  --ink:#1c1510;
  --ink2:#3d2f22;
  --muted:#7a6e62;
  --border:#d9cec2;
  --gold:#b87a0e;
  --gold2:#d4950f;
  --btn:#b06010;
  --btn-h:#8f4d0a;
  --dark:#1e1812;
  --green:#2d6a4f;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
.serif{font-family:'Fraunces',serif;}

/* NAV */
nav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 32px;
  background:rgba(245,240,232,0.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.nav-logo{font-size:12px;letter-spacing:.18em;font-weight:500;color:var(--gold);text-transform:uppercase;}
.nav-cta{
  background:var(--btn);color:#fff;
  padding:10px 22px;border-radius:8px;
  font-size:14px;font-weight:500;
  text-decoration:none;transition:background .18s;
}
.nav-cta:hover{background:var(--btn-h);}

/* HERO */
.hero{
  text-align:center;padding:80px 24px 60px;
  max-width:780px;margin:0 auto;
}
.badge{
  display:inline-block;
  border:1px solid var(--border);
  border-radius:100px;padding:6px 18px;
  font-size:12px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);margin-bottom:32px;
}
.hero h1{
  font-family:'Fraunces',serif;
  font-size:clamp(2.6rem,6vw,4.2rem);
  font-weight:900;line-height:1.05;
  color:var(--ink);margin-bottom:28px;
}
.hero h1 em{color:var(--gold);font-style:italic;}
.hero-sub{
  font-size:clamp(1rem,2vw,1.15rem);
  color:var(--muted);line-height:1.7;
  max-width:560px;margin:0 auto 44px;
}

/* COUNTDOWN */
.countdown-wrap{
  background:var(--dark);border-radius:16px;
  padding:36px 32px 32px;margin:0 auto 36px;
  max-width:520px;
}
.countdown-label{
  font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,255,255,0.45);margin-bottom:20px;
}
.countdown{
  display:flex;align-items:flex-start;justify-content:center;gap:8px;
  margin-bottom:28px;
}
.cd-unit{display:flex;flex-direction:column;align-items:center;}
.cd-num{
  font-family:'Fraunces',serif;
  font-size:clamp(2.4rem,8vw,3.6rem);
  font-weight:700;color:#fff;line-height:1;
}
.cd-sep{
  font-family:'Fraunces',serif;
  font-size:clamp(2rem,6vw,3rem);
  color:rgba(255,255,255,0.3);
  line-height:1;padding:0 2px;
  margin-top:4px;
}
.cd-sub{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-top:6px;}
.price-row{display:flex;align-items:baseline;justify-content:center;gap:12px;}
.price-old{font-size:1rem;color:rgba(255,255,255,0.35);text-decoration:line-through;}
.price-new{font-family:'Fraunces',serif;font-size:clamp(2rem,5vw,2.8rem);font-weight:700;color:var(--gold2);}
.price-note{font-size:.85rem;color:rgba(255,255,255,0.45);}

/* CTA */
.cta-block{text-align:center;margin-bottom:16px;}
.btn-main{
  display:inline-block;
  background:var(--btn);color:#fff;
  padding:18px 40px;border-radius:10px;
  font-size:1.05rem;font-weight:500;
  text-decoration:none;
  transition:background .18s,transform .12s;
}
.btn-main:hover{background:var(--btn-h);transform:translateY(-1px);}
.btn-note{font-size:13px;color:var(--muted);margin-top:12px;}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:64px 0;}

/* SECTION */
.section{max-width:900px;margin:0 auto;padding:0 24px;}
.eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:16px;}
.section-title{
  font-family:'Fraunces',serif;
  font-size:clamp(2rem,4vw,2.8rem);
  font-weight:700;line-height:1.1;
  color:var(--ink);margin-bottom:32px;
}

/* FOR WHOM */
.whom-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.whom-item{
  display:flex;align-items:flex-start;gap:14px;
  padding:20px 24px;
  border-bottom:1px solid
